    destinationDirectory = distDir.get().asFile
    webXml = file("${stagedRobotsResourcesDir.get().asFile}/WEB-INF/web.xml")
    classpath(configurations.hyraxLibs)

    from(file("${stagedHyraxResourcesDir.get().asFile}/WEB-INF/conf/olfs.xml")) {
        into 'WEB-INF/conf'
