    'encoder-jsp-1.2.2.jar',
    'gson-2.8.9.jar',
    'json-simple-1.1.1.jar',
    'jdom-1.1.1.jar',
    'junit-4.13.2.jar',
    'hamcrest-all-1.3.jar',
    'apache-commons-lang3-3.14.0.jar',
    'apache-commons-text-1.12.0.jar',
    'apache-commons-cli-1.2.jar',
    'apache-commons-httpclient-3.1.jar',
    'apache-commons-logging-1.1.3.jar',
    'apache-commons-codec-1.8.jar',
    'apache-commons-io-2.4.jar',
    'org.apache.httpcomponents.httpclient_4.5.3.jar',
    'org.apache.httpcomponents.httpcore_4.4.6.jar',
