    filter(ReplaceTokens, tokens: filterTokens)
}

tasks.register('stageNgapResources', Sync) {
    group = 'build setup'
    description = 'Stage and filter NGAP resources into build/ngap.'

    from('resources/ngap') {
        exclude '**/*.png'
        exclude 'lib/**'
    }
    into stagedNgapResourcesDir
    filteringCharset = 'UTF-8'
    filter(ReplaceTokens, tokens: filterTokens)
}

tasks.register('PreProcessSourceCode') {
    group = 'build setup'
    description = 'Move filtered sources and resources into generated build trees.'

    dependsOn tasks.named('clean')
    dependsOn(
        tasks.named('stageSourceTree'),
        tasks.named('stageHyraxResources'),
        tasks.named('stageRobotsResources'),
        tasks.named('stageNgapResources')
    )
}

tasks.named('compileJava') {
    dependsOn tasks.named('PreProcessSourceCode')
}

tasks.named('test', Test) {
    group = 'verification'
    description = 'Run the same focused JUnit 4 checks as Ant check.'

    dependsOn tasks.named('classes')
    useJUnit()
    testClassesDirs = sourceSets.main.output.classesDirs
    classpath = sourceSets.main.runtimeClasspath + configurations.providedTomcatLibs
    scanForTestClasses = false
    include antCheckTestIncludes

    testLogging {
        events 'passed', 'skipped', 'failed', 'standardOut', 'standardError'
        exceptionFormat = 'full'
        showStandardStreams = true
    }
}

tasks.named('check') {
    group = 'verification'
    description = 'Run Ant-parity focused checks.'
}

tasks.matching { it.name in ['sonar', 'sonarqube'] }.configureEach {
