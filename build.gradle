    'jwks-rsa-0.22.1.jar',
    'joda-time-2.12.7.jar',
    'urlrewrite-3.2.0.jar',
    'wcs-v_2_0-2.6.1.jar',
    'gml-v_3_2_1-2.6.1.jar',
    'sweCommon-v_2_0-2.6.1.jar',
    'gmlcov-v_1_0-2.6.1.jar',
    'ows-v_2_0-2.6.1.jar',
