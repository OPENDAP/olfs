def warEntriesWithoutMetadata = { File archiveFile ->
    def zip = new java.util.zip.ZipFile(archiveFile)
    try {
        zip.entries()
            .findAll { !it.directory }
            .collect { it.name }
            .findAll { !it.startsWith('META-INF/') }
            .sort()
    }
    finally {
        zip.close()
    }
}

def archiveEntryBytes = { File archiveFile, String entryName ->
    def zip = new java.util.zip.ZipFile(archiveFile)
    try {
        def entry = zip.getEntry(entryName)
        if (entry == null) {
            throw new GradleException("Archive ${archiveFile.name} is missing ${entryName}")
        }
        zip.getInputStream(entry).bytes
    }
    finally {
        zip.close()
    }
}

def tarEntries = { File archiveFile ->
    def entries = []
    tarTree(resources.gzip(archiveFile)).visit { details ->
        if (!details.isDirectory()) {
            entries << details.path
        }
    }
    entries.sort()
}

def formatSetDiff = { Collection leftEntries, Collection rightEntries, String leftLabel, String rightLabel ->
    def leftOnly = (leftEntries as Set) - (rightEntries as Set)
    def rightOnly = (rightEntries as Set) - (leftEntries as Set)
    [
        leftOnly ? "${leftLabel} only: ${leftOnly.sort().join(', ')}" : null,
        rightOnly ? "${rightLabel} only: ${rightOnly.sort().join(', ')}" : null
    ].findAll { it != null }.join('\n')
}

