import org.apache.tools.ant.filters.ReplaceTokens

plugins {
    id 'java'
    id 'war'
    id 'eclipse'
    id 'idea'
    id 'org.sonarqube' version '6.2.0.5505'
}

group = 'org.opendap'
description = 'The OLFS build'

def propertyOrDefault = { String name, String defaultValue ->
    project.findProperty(name)?.toString() ?: defaultValue
}

ext {
    DEPLOYMENT_CONTEXT = propertyOrDefault('DEPLOYMENT_CONTEXT', 'opendap')
    NGAP_DEPLOYMENT_CONTEXT = propertyOrDefault('NGAP_DEPLOYMENT_CONTEXT', 'ngap')

    HYRAX_VERSION = propertyOrDefault('HYRAX_VERSION', 'Not.A.Release')
    OLFS_VERSION = propertyOrDefault('OLFS_VERSION', 'Not.A.Release')
    NGAP_VERSION = propertyOrDefault('NGAP_VERSION', HYRAX_VERSION)
    WCS_VERSION = propertyOrDefault('WCS_VERSION', HYRAX_VERSION)

    OLFS_DIST_BASE = propertyOrDefault('OLFS_DIST_BASE', "olfs-${OLFS_VERSION}")
    NGAP_DIST_BASE = propertyOrDefault('NGAP_DIST_BASE', "ngap-${HYRAX_VERSION}")
    WEBAPP_DIST = "${OLFS_DIST_BASE}-webapp"

    SRC_DIST = "${OLFS_DIST_BASE}-src"
    DOC_DIST = "${OLFS_DIST_BASE}-doc"
    OLFS_LIB = OLFS_DIST_BASE
}

def stagedSourceDir = layout.buildDirectory.dir('src')
def stagedHyraxResourcesDir = layout.buildDirectory.dir('resources')
def stagedRobotsResourcesDir = layout.buildDirectory.dir('robots')
def stagedNgapResourcesDir = layout.buildDirectory.dir('ngap')

def filterTokens = [
    HyraxVersion      : HYRAX_VERSION,
    OlfsVersion       : OLFS_VERSION,
    SERVICE_CONTEXT   : DEPLOYMENT_CONTEXT,
    WCS_SOFTWARE_VERSION: WCS_VERSION,
    WcsSoftwareVersion: WCS_VERSION
]

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

repositories {
    mavenCentral()
}

dependencies {
    implementation fileTree(dir: 'lib', include: ['*.jar'], exclude: ['catalina-6.0.53.jar', 'servlet-api-3.0.jar'])
    compileOnly files('lib/catalina-6.0.53.jar', 'lib/servlet-api-3.0.jar')
}

sourceSets {
    main {
        java {
            srcDirs = []
            srcDir(stagedSourceDir)
        }
        resources {
            srcDirs = []
        }
    }
    test {
        java {
            srcDirs = []
        }
        resources {
            srcDirs = []
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.deprecation = true
    options.encoding = 'UTF-8'
    options.release = 8
}

sonarqube {
    properties {
        property 'sonar.sourceEncoding', 'UTF-8'
        property 'sonar.projectKey', 'opendap-olfs'
        property 'sonar.projectName', 'olfs'
        property 'sonar.projectVersion', OLFS_VERSION
        property 'sonar.organization', 'opendap'
        property 'sonar.inclusions', 'src'
        property 'sonar.exclusions', 'src/opendap/Coverity_Model.java,retired/**/*.java,src/opendap/**/*Test.java'
        property 'sonar.java.binaries', layout.buildDirectory.dir('classes').get().asFile.absolutePath
        property 'sonar.java.libraries', fileTree(dir: 'lib', include: ['*.jar']).files*.absolutePath.join(',')
    }
}

tasks.register('showInfo') {
    group = 'help'
    description = 'Display build and version properties.'

    doLast {
        println '##########################################################'
        println '# Gradle Build Settings'
        println '#'
        println "                  Project Name: ${project.name}"
        println "                 Hyrax Version: ${HYRAX_VERSION}"
        println "                  OLFS Version: ${OLFS_VERSION}"
        println "                  NGAP Version: ${NGAP_VERSION}"
        println "                   WCS Version: ${WCS_VERSION}"
        println "            Deployment Context: ${DEPLOYMENT_CONTEXT}"
        println "       NGAP Deployment Context: ${NGAP_DEPLOYMENT_CONTEXT}"
        println ''
        println 'Distribution Targets:'
        println "            OLFS_DIST_BASE: ${OLFS_DIST_BASE}"
        println "            NGAP_DIST_BASE: ${NGAP_DIST_BASE}"
        println "               WEBAPP_DIST: ${WEBAPP_DIST}"
        println "                  SRC_DIST: ${SRC_DIST}"
        println "                  DOC_DIST: ${DOC_DIST}"
        println "                  OLFS_LIB: ${OLFS_LIB}"
        println ''
        println 'Generated Directories:'
        println "                 build/src: ${stagedSourceDir.get().asFile}"
        println "           build/resources: ${stagedHyraxResourcesDir.get().asFile}"
        println "              build/robots: ${stagedRobotsResourcesDir.get().asFile}"
        println "                build/ngap: ${stagedNgapResourcesDir.get().asFile}"
        println '##########################################################'
    }
}

tasks.register('stageSourceTree', Copy) {
    group = 'build setup'
    description = 'Stage and filter Java sources into build/src.'

    from('src') {
        include 'com/**'
        include 'opendap/**'
        include 'org/opendap/**'

        exclude 'opendap/cmr/**'
        exclude 'opendap/wcs/v1_1_2/**'
        exclude 'opendap/semantics/**'
        exclude 'opendap/aws/**'
        exclude 'opendap/async/**'
    }
    into stagedSourceDir
    filteringCharset = 'UTF-8'
    filter(ReplaceTokens, tokens: filterTokens)
}

tasks.register('stageHyraxResources', Copy) {
    group = 'build setup'
    description = 'Stage and filter Hyrax resources into build/resources.'

    from('resources/hyrax')
    into stagedHyraxResourcesDir
    filteringCharset = 'UTF-8'
    filter(ReplaceTokens, tokens: filterTokens)
}

tasks.register('mergeWcsResources', Copy) {
    group = 'build setup'
    description = 'Merge filtered WCS 2.0 resources into build/resources.'

    from('resources/WCS/2.0') {
        include 'xsl/**'
        include 'WEB-INF/**'

        exclude 'WEB-INF/web.xml'
        exclude 'WEB-INF/urlrewrite.xml'
        exclude 'WEB-INF/logback.xml'
        exclude 'WEB-INF/logback-test.xml'
    }
    into stagedHyraxResourcesDir
    filteringCharset = 'UTF-8'
    filter(ReplaceTokens, tokens: filterTokens)
    dependsOn tasks.named('stageHyraxResources')
}

tasks.register('stageRobotsResources', Copy) {
    group = 'build setup'
    description = 'Stage and filter robots resources into build/robots.'

    from('resources/robots')
    into stagedRobotsResourcesDir
    filteringCharset = 'UTF-8'
    filter(ReplaceTokens, tokens: filterTokens)
}

tasks.register('stageNgapResources', Copy) {
    group = 'build setup'
    description = 'Stage and filter NGAP resources into build/ngap.'

    from('resources/ngap') {
        exclude '*.png'
        exclude 'lib/**'
    }
    into stagedNgapResourcesDir
    filteringCharset = 'UTF-8'
    filter(ReplaceTokens, tokens: filterTokens)
}

tasks.register('PreProcessSourceCode') {
    group = 'build setup'
    description = 'Move filtered sources and resources into generated build trees.'

    dependsOn(
        tasks.named('stageSourceTree'),
        tasks.named('mergeWcsResources'),
        tasks.named('stageRobotsResources'),
        tasks.named('stageNgapResources')
    )
}

tasks.named('compileJava') {
    dependsOn tasks.named('PreProcessSourceCode')
}
